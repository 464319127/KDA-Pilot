[task]
slug = "glm52_bs1__mtp_chain_megakernel"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 (TP=8, NVLink NVLS)"
family = "spec_decode"
kernel_family = "mtp_chain_megakernel"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
entry_points = ["minisgl.engine.graph GraphRunner._capture_mtp_chain"]
evidence_json = "docs/profile_evidence.json"

[selection]
method = "mini-sglang bs=1 round anatomy (chain+extend ~2.0ms of 17.6ms)"
max_pct_of_gpu = 11.0
best_scenario = "bs1_spec_k7_chain6"
dataset = "greedy essay 256 tok"
concurrency = "1"

[shapes]
steps = 6
M = 1
H = 6144
vocab_shard = 18944
kv = "MLA combined 512+64, page 64, single request slot"

[build]
language = "cuda"
baseline_entry_point = "baseline/chain_graph_baseline.py::baseline"
candidate_entry_point = "solution/chain_megakernel.py::candidate"

[benchmark]
warmup_runs = 10
iterations = 100
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 0.99
graph_timed = true
multi_process = 8
target_ms = 0.8
match_metric = "greedy draft token exact-match rate over 1k-round replay corpus"

[deploy]
tier = "B"
note = "draft side: numerics-free swing; accept can only be re-measured, not broken silently (lossless verify)"
