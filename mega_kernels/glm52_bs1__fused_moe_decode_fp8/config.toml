[task]
slug = "glm52_bs1__fused_moe_decode_fp8"
arch = "b300"
target_gpu = "NVIDIA B300 (sm_103)"
family = "moe"
kernel_family = "fused_moe_decode_fp8_blockscale"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
entry_points = [
  "minisgl.kernel.moe_decode.moe_decode",
  "sglang.srt.layers.moe.moe_runner.triton_utils.fused_moe.fused_experts_impl",
]
evidence_json = "docs/profile_evidence.json"

[selection]
method = "mini-sglang bs=1 round anatomy (fixed k=7 MTP decode, measured)"
max_pct_of_gpu = 23.0
best_scenario = "bs1_spec_k7_verify_m8"
dataset = "greedy essay 256 tok"
concurrency = "1"

[shapes]
H = 6144
E = 256
I = 256
topk = 8
M = [1, 2, 3, 4, 5, 6, 7, 8]  # verify M=7 at project k=6 is the hot shape; keep M<=8 support
weight_dtype = "float8_e4m3fn"
scale_block = [128, 128]

[build]
language = "cuda"
baseline_entry_point = "baseline/moe_decode_baseline.py::baseline"
candidate_entry_point = "solution/moe_decode_candidate.py::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
graph_timed = true
targets_us = { M1 = 14.0, M7 = 44.0, M8 = 48.0 }
oracle_rel_err_max = 5e-3

[deploy]
tier = "B"
mtp_layer = "unconditional"
main_model = "accept-histogram A/B required (bimodal full-accept bin preserved)"
