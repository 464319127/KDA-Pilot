[task]
slug = "glm52_bs1__skinny_gemm_bf16_tc"
arch = "b300"
target_gpu = "NVIDIA B300 (sm_103)"
family = "quant_gemm"
kernel_family = "skinny_gemm_bf16_tensorcore"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
