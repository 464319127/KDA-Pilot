[task]
slug = "glm52_bs1__silu_mul_quant_fp8_bitwise"
arch = "b300"
target_gpu = "NVIDIA B300 (sm_103)"
family = "moe"
kernel_family = "act_quant_fused"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
entry_points = [
  "sgl_kernel.silu_and_mul",
  "sglang sglang_per_token_group_quant_fp8",
]
evidence_json = "docs/profile_evidence.json"

[selection]
method = "mini-sglang bs=1 round anatomy (act+quant pair ~4.8us/layer @M=8)"
max_pct_of_gpu = 2.0
best_scenario = "bs1_spec_k7_verify_m8"
dataset = "greedy essay 256 tok"
concurrency = "1"

[shapes]
rows = [8, 16, 32, 64]
N = 512
group = 128
out_dtype = "float8_e4m3fn"

[build]
language = "cuda"
baseline_entry_point = "baseline/act_quant_pair.py::baseline"
candidate_entry_point = "solution/silu_mul_quant.py::candidate"

[benchmark]
warmup_runs = 10
iterations = 500
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
graph_timed = true
target_us = { M8 = 2.0 }
match = "bitwise (uint8 view + fp32 scales, torch.equal)"

[deploy]
tier = "A"
note = "bitwise contract = deployable on the main model without accept A/B"
