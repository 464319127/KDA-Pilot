[task]
slug = "glm52_bs1__mla_decode_bs_consistent"
arch = "b300"
target_gpu = "NVIDIA B300 (sm_103)"
family = "attention"
kernel_family = "mla_absorbed_paged_decode"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
entry_points = ["flashinfer.decode.trtllm_batch_decode_with_kv_cache_mla"]
evidence_json = "docs/profile_evidence.json"

[selection]
method = "mini-sglang bs=1 round anatomy + k>=8 accept-collapse root cause"
max_pct_of_gpu = 8.0
best_scenario = "bs1_spec_k7_verify_m8"
dataset = "greedy essay 256 tok"
concurrency = "1"

[shapes]
B = [1, 8, 9, 10]
heads = 16
head_dim_ckv = 512
head_dim_kpe = 64
page = 64
kv_len = [1024, 4096, 8192]
dtype = "bfloat16"

[build]
language = "cuda"
baseline_entry_point = "baseline/trtllm_mla_baseline.py::baseline"
candidate_entry_point = "solution/mla_decode_candidate.py::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
graph_timed = true
target = "B=8 <= 15us OR (<= 20us AND bitwise B-consistent rows)"
oracle_rel_err_max = 1e-3

[deploy]
tier = "B"
note = "B-consistent rows + M-invariant MoE would unlock k=8-9 (accept ~6, +8-10% e2e)"
