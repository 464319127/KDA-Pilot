[task]
slug = "glm52_bs1__oneshot_allreduce_bf16"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 (NVLink NVLS)"
family = "comm"
kernel_family = "oneshot_allreduce_nvls"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm52_bs1"
entry_points = ["minisgl.distributed DistributedCommunicator.all_reduce"]
evidence_json = "docs/profile_evidence.json"

[selection]
method = "mini-sglang bs=1 round anatomy (156 ARs/round x 12.1us NCCL NVLS)"
max_pct_of_gpu = 11.0
best_scenario = "bs1_spec_k7_verify_m8"
dataset = "greedy essay 256 tok"
concurrency = "1"

[shapes]
dtype = "bfloat16"
numel = [6144, 49152]
world_size = 8

[build]
language = "cuda"
baseline_entry_point = "baseline/nccl_allreduce.py::baseline"
candidate_entry_point = "solution/nvls_oneshot.py::candidate"

[benchmark]
warmup_runs = 20
iterations = 500
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
graph_timed = true
multi_process = 8
targets_us = { M7 = 8.0, M8 = 8.0, M1 = 6.0 }

[deploy]
tier = "B"
note = "comm reorder ~1e-6 band, measured accept-safe; run one A/B anyway; deterministic ordering is a bonus worth reporting"
