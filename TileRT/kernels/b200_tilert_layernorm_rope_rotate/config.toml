tilert_latency_us = 6.88
tilert_hbm_pct = 0.04
measurement = "isolated_ncu_median_n3"
measured = true
seqlens = [1, 2, 4, 8, 16]
compute_types = [3]   # 0=none 3=bf16 5/6/8=fp4 7=fp8

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
required_matched_ratio = 1.0
