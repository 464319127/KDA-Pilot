[task]
slug = "b200_tilert_mla_decode"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "mla_decode"
tilert_op = "tilert::pure_mla_layer / sparse_select_mla_layer"
tilert_kernel = "PureMlaDsv32ExecutorImpl<DefaultSchedule, ., 16384, 1, 1, .>"
[build]
language = "cuda"
baseline_entry_point = "baseline/mla_decode.py::mla_decode_baseline"
candidate_entry_point = "solution/kernel.cu::mla_decode_candidate"
[reference]
# ≥3× isolated ncu median (PureMlaDsv32, gpu__time_duration.avg) on idle B200.
# Per-seq median us / HBM%: s1=11.68/2.72  s2=12.45/2.56  s4=12.48/2.59 (disp ≤2.8%).
# (seq=3 lives in flash_sparse_mla = 12.29us.) See ../../docs/tilert_reference.md.
tilert_latency_us = 11.68
tilert_hbm_pct = 2.72
measurement = "isolated_ncu_median_n3"
measured = true
ingraph_latency_us = 35.2   # in-graph profiler avg per call (52.8% of decode)
decode_share_pct = 52.8
note = "isolated single-launch = 11.68us; in-graph per-call = 35.2us (folds in dependent waits). flashinfer MLA same shape = 25.5us."
[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
