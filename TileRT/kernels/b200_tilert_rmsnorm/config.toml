[task]
slug = "b200_tilert_rmsnorm"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "rmsnorm"
tilert_op = "tilert::rmsnorm_op"
tilert_kernel = "RMSNormExecutorImpl<DefaultSchedule, 4, ., 1, ., .>"
decode_share_pct = 0.0
standalone_measurable = "yes"

[build]
language = "cuda"
baseline_entry_point = "baseline/rmsnorm.py::rmsnorm_baseline"
candidate_entry_point = "solution/kernel.cu::rmsnorm_candidate"

[reference]
# ≥3× isolated ncu medians (gpu__time_duration.avg) on idle B200.
# Per-seq (median us / HBM%): 1=7.46us/0.1%HBM, 2=7.65us/0.13%HBM, 4=7.36us/0.18%HBM. See ../../docs/tilert_reference.md.
tilert_latency_us = 7.46
tilert_hbm_pct = 0.1
measurement = "isolated_ncu_median_n3"
measured = true
seqlens = [1, 2, 4, 8, 16]
compute_types = [3]   # 0=none 3=bf16 5/6/8=fp4 7=fp8

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
required_matched_ratio = 1.0
