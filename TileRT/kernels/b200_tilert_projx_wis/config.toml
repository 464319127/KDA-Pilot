[task]
slug = "b200_tilert_projx_wis"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "projx_wis"
tilert_op = "tilert::proj_w_op"
tilert_kernel = "ProjXWisExecutorImpl<DefaultSchedule, 4, ., 1, ., .>"
decode_share_pct = 0.0
standalone_measurable = "yes"

[build]
language = "cuda"
baseline_entry_point = "baseline/projx_wis.py::projx_wis_baseline"
candidate_entry_point = "solution/kernel.cu::projx_wis_candidate"

[reference]
# ≥3× isolated ncu medians (gpu__time_duration.avg) on idle B200.
# Per-seq (median us / HBM%): 1=6.11us/2.03%HBM, 2=5.98us/2.09%HBM, 4=6.59us/1.96%HBM. See ../../docs/tilert_reference.md.
tilert_latency_us = 6.11
tilert_hbm_pct = 2.03
measurement = "isolated_ncu_median_n3"
measured = true
seqlens = [1, 2, 4, 8, 16]
compute_types = [0,7]   # 0=none 3=bf16 5/6/8=fp4 7=fp8

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
required_matched_ratio = 1.0
