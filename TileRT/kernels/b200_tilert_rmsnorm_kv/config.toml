[task]
slug = "b200_tilert_rmsnorm_kv"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "rmsnorm_kv"
tilert_op = "tilert::rmsnorm_kv_op"
tilert_kernel = "RmsnormKvExecutorImpl<DefaultSchedule, 4, ., 1, ., .>"
decode_share_pct = 0.0
standalone_measurable = "yes"

[build]
language = "cuda"
baseline_entry_point = "baseline/rmsnorm_kv.py::rmsnorm_kv_baseline"
