[task]
slug = "b200_tilert_fused_moe"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "fused_moe"
tilert_op = "tilert::fused_moe / expert_select_up_gate_silu + expert_down_allreduce"
tilert_kernel = "FusedMoeExecutorImpl<DefaultSchedule, 4, 36864, 1, 1, .>"
[build]
language = "cuda"
baseline_entry_point = "baseline/fused_moe.py::fused_moe_baseline"
