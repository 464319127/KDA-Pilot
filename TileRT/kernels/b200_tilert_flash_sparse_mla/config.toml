# Per-seq (median us / HBM%): 1=11.68us/2.72%HBM, 2=12.45us/2.56%HBM, 3=12.29us/2.61%HBM, 4=12.48us/2.59%HBM. See ../../docs/tilert_reference.md.
tilert_latency_us = 11.68
tilert_hbm_pct = 2.72
measurement = "isolated_ncu_median_n3"
measured = true
seqlens = [1, 2, 3, 4]
compute_types = [7]   # 0=none 3=bf16 5/6/8=fp4 7=fp8

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
required_matched_ratio = 1.0
