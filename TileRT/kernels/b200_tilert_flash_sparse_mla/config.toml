[task]
slug = "b200_tilert_flash_sparse_mla"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "flash_sparse_mla"
tilert_op = "tilert::flash_sparse_mla_op"
tilert_kernel = "FlashSparseMlaDSv32DevBExecutorImpl<DefaultSchedule, 4, ., 1, ., .>"
