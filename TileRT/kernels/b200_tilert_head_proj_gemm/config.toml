[task]
slug = "b200_tilert_head_proj_gemm"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "head_proj_gemm"
tilert_op = "tilert::head_proj_op"
tilert_kernel = "HeadProjExecutorImpl<DefaultSchedule, 4, 40960, 1, 1, 3>"

[build]
language = "cuda"
destination_passing_style = true
baseline_entry_point = "baseline/head_proj.py::head_proj_baseline"
candidate_entry_point = "solution/kernel.cu::head_proj_candidate"

[reference]
# Measured on B200 from the real libtilert_dsv32.so via ncu (see docs/tilert_reference.md)
# ≥3× isolated ncu median (gpu__time_duration.avg), idle B200. Per-seq median us / HBM%:
#   s1=39.42/77.6  s2=39.55/77.4  s4=42.24/72.4  (disp ≤3.0%). See ../../docs/tilert_reference.md
tilert_latency_us = 39.42
tilert_hbm_pct = 77.6
tilert_bytes_mb = 235.2
measurement = "isolated_ncu_median_n3"
measured = true
grid = "148x1x1"
block = "384x1x1"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
target_sample_us = 1000
timeout_seconds = 600
required_matched_ratio = 1.0
