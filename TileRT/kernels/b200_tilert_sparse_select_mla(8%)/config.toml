[task]
slug = "b200_tilert_sparse_select_mla"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "sparse_select_mla"
tilert_op = "tilert::flash_sparse_mla_op"
tilert_kernel = "SparseSelectMlaDsv32ExecutorImpl<DefaultSchedule, 4, ., 1, ., .>"
decode_share_pct = 7.6
standalone_measurable = "yes"

[build]
language = "cuda"
baseline_entry_point = "baseline/sparse_select_mla.py::sparse_select_mla_baseline"
candidate_entry_point = "solution/kernel.cu::sparse_select_mla_candidate"

[reference]
# Unified standard = ISOLATED single-kernel ncu (never in-graph). SparseSelectMlaDsv32
# is the SAME flash_sparse_mla_op kernel as PureMla (168 reg / 16384 smem, kv_len=2048),
# just the GPU0 self-MLA variant with 16 heads vs the worker's 20 — i.e. slightly LESS
# work, so its isolated time ≈ PureMla's 11.68us (s1; ~12.5us s2/s4). The earlier 35.4us
# was the in-graph per-call (7.6% of decode), kept below as engine-level info only.
tilert_latency_us = 11.68
measurement = "isolated_ncu_median_via_puremla"   # same flash_sparse_mla kernel; not separately swept
measured = true
ingraph_latency_us = 35.4   # in-graph per-call; engine-level reference, NOT the KDA target
decode_share_pct = 7.6
seqlens = [1, 2, 4]
compute_types = [3]   # 0=none 3=bf16 5/6/8=fp4 7=fp8

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
required_matched_ratio = 1.0
