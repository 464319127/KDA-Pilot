[task]
slug = "b200_diffusion_fuse_scale_shift__multi_shape"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "fuse_scale_shift"
entry_points = [
  "sglang.jit_kernel.diffusion.triton.scale_shift:fuse_scale_shift_kernel",
  "sglang.jit_kernel.diffusion.triton.scale_shift:fuse_layernorm_scale_shift_gate_select01_kernel",
  "sglang.jit_kernel.diffusion.triton.scale_shift:fuse_residual_layernorm_scale_shift_gate_select01_kernel",
]

[build]
language = "cuda"
destination_passing_style = true
# Copied upstream implementation is Triton; it is exposed through local
# destination-passing Python launchers with the same ABI as the candidate
# (one entry per upstream public entry point, outputs passed last).
baseline_entry_points = [
  "baseline/binding.py::fuse_scale_shift",
  "baseline/binding.py::fuse_layernorm_scale_shift_gate_select01",
  "baseline/binding.py::fuse_residual_layernorm_scale_shift_gate_select01",
]
candidate_entry_points = [
  "solution/kernel.cu::fuse_scale_shift",
  "solution/kernel.cu::fuse_layernorm_scale_shift_gate_select01",
  "solution/kernel.cu::fuse_residual_layernorm_scale_shift_gate_select01",
]

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
inner_iterations_min = 1
inner_iterations_max = 4096
target_sample_us = 1000
timeout_seconds = 600
use_isolated_runner = true
required_matched_ratio = 1.0
