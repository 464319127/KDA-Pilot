[task]
slug = "megatasks/12 (gemm_ar_fused_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103, NV18 mesh, NVLS multimem)"
target_host = "glm52-bs1-opt (rx devbox pool)"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega12"
family = "comm_gemm_fusion"
kernel_family = "producer GEMM with fused multimem allreduce epilogue (+add+rmsnorm at consumer edge)"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 381.42: every TP-parallel layer ends with RowParallel GEMM (o_proj / MoE output) -> fused AR(+add+norm), 157 AR calls/iter x 7.6us = 1.19 ms/iter AFTER task-01; the AR is latency-floor-bound as a STANDALONE kernel (NVLS fan-out + Lamport wait ~7.6us, protocol floor 2-3us) - the next level is removing the kernel boundary entirely"
entry_points = [
  "task-01 jit module (mnnvl_ar_fused: proven multimem protocol, device functions reusable)",
  "producer GEMMs: o_proj [T,2048]x[2048->6144 row-parallel] bf16 (nvjet today); MoE finalize output (task-09 megakernel epilogue candidate)",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: bs1_gemm_ar_fused)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "chain today: nvjet GEMM (partial sums per rank) -> [kernel boundary + global round-trip] -> oneshotAllreduceFusionKernel (multimem st -> switch ld_reduce -> add+norm) = GEMM + 7.6us"
key_insight = "at T<=6 the AR payload is tiny (12-74KB); its 7.6us is dominated by launch + fan-out latency + peer-arrival spin, NOT bandwidth. If the producer GEMM's epilogue multimem-stores each output tile as soon as it is computed, the fan-out overlaps the GEMM tail and the standalone AR kernel disappears; consumer-side ld_reduce+add+norm folds into the next kernel's prologue (or a tiny tail block)."

[benchmark]
mode = "8-GPU single-process harness (extend common/harness/ar_bench.py): per-device CUDA graphs, concurrent replay; measure chain = GEMM+AR combined wall, vs baseline nvjet + task-01 AR"
gate = "combined chain (T=6, o_proj shape) >= 1.25x vs baseline chain AND GEMM section >= 95% of standalone nvjet BW AND fp32 oracle rel <= 2e-2 (reduction order changes are inherent); 1000-replay stability across ranks; e2e sanity >= 383 + accept >= 3.80"
device = "all 8 GPUs (collective); single-rank dev meaningless beyond compile"

[deliverable]
route = "P0: reproduce task-01 AR as device functions callable from an epilogue (multimem st + flag arrival + epoch rotation preserved); P1: bf16 small-M GEMM (start from B200-promoted M<=6 kernel or CUTLASS epilogue-visitor) whose epilogue multimem-stores tiles + arrival flags, consumer prologue does ld_reduce+add+rmsnorm; P2: env-gated serving dispatch for the o_proj->AR site first (157->~79 standalone ARs), then evaluate MoE-output site with task 09"
expected_e2e = "-0.3 to -0.6 ms/iter across both AR sites if the chain gate holds"
