[benchmark]
mode = "8x per-device 50-round CUDA graphs, concurrent replay, wall/round (harness pattern in common/harness/ar_bench.py)"
gate_port = "P0: jit port bit-exact vs flashinfer original (all 8 ranks) AND isolated perf within +-3% AND e2e sanity >= 376 with flag ON"
gate_opt = "P1: T=6 <= 7.0us (stretch 5us) AND T=1 not regressed; 1000-replay bitwise stable; NCU evidence (--replay-mode application)"
device = "all 8 GPUs, single process + cudaDeviceEnablePeerAccess + cuMulticast workspace"

[deliverable]
route = "port cuh -> sglang jit_kernel with identical NVLS multimem protocol; then bs=1 specialize: constant T/H/world/eps, weight ptr stable across replays, grid/block resize for 6-token payload, fence granularity, PDL entry, fold more epilogue"
expected_e2e = "-0.15 to -0.35 ms/iter (each -1us/call = -0.157 ms/iter)"
