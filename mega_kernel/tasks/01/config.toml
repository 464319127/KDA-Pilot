[task]
slug = "metatasks/01 (dense_fp8_gemm_bs1)"
arch = "b300"
target_gpu = "NVIDIA B300 SXM6 AC (sm_103)"
target_host = "glm52-bs1-opt"        # rx devbox, ssh alias on this Mac
remote_container = "none"            # devbox pod IS the sglang 0.5.14 container
remote_workdir = "/scratch/kda_bs1/mega01"
family = "quant_gemm"
kernel_family = "linear_gemm_small_m"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP(5-1-6), verify M=6 x ~390 calls/iter, draft M=1 x ~20"
entry_points = [
  "sglang.srt.layers.quantization.fp8_utils.deepgemm_w8a8_block_fp8_linear_with_fallback",
]
shapes_doc = "SHAPES.md"
prior_attempts = "PRIOR_ATTEMPTS.md"
results = "RESULTS_SM103.md"

[baseline]
a = "DeepGEMM fp8_gemm_nt + sglang per-token-group quant (in-graph ~11us @ M=6)"
b = "cuBLAS bf16 (current prod via SGLANG_BS1_BF16_DENSE, cold-L2 2.35-9.45us)"

[benchmark]
mode = "cold-L2 in-graph"
weight_copies = 48
gate = "weighted geomean > 1.0 vs BOTH baselines, no production row < 0.97"
device = "GPU7 (K2_DEV=7)"

[deliverable]
main = "M=6 CUTLASS SM100/103 blockwise tensor-op small-M kernel"
bonus = "retire SGLANG_BS1_BF16_DENSE -> runtime back to 100% FP8"
expected_e2e = "-1.4 ms/iter"
