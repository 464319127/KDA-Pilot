[task]
slug = "megatasks/01 (mnnvl_ar_jit_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103, NV18 full mesh, NVLS multimem)"
target_host = "glm52-bs1-opt"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega01"
family = "comm"
kernel_family = "allreduce_fused_add_rmsnorm"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP 5-1-6 @ 376.06 tok/s official: oneshotAllreduceFusionKernel 157 calls/iter x 8.3us = 1.31 ms/iter (largest single open-source item)"
entry_points = [
  "flashinfer/data/include/flashinfer/comm/trtllm_mnnvl_allreduce.cuh (oneshotAllreduceFusionKernel, JIT source)",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: mnnvl_ar_fused)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "flashinfer 0.6.12 mnnvl oneshot fused AR+add+rmsnorm: 8.3us/call in-graph at T=6 H=6144 world=8"
