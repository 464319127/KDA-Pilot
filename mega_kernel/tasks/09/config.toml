[benchmark]
mode = "single-GPU CUDA-graph replay on frozen [T,*] shapes, cold-L2 (rotate >=48 weight copies: 32 local experts x fp8 block weights are the dominant bytes)"
gate = "per-layer chain (T=6, 32 local experts, top-8+shared): fused kernel <= 42us (>=1.35x vs 55-60us 5-launch chain) AND fp32-oracle rel <= 2e-2 AND weight-bytes/s >= 85% of cubin gemm pair; e2e sanity >= 383 + accept >= 3.80 + official 3x40"
device = "1 GPU dev; 8-GPU serving e2e"

[deliverable]
route = "persistent single kernel per MoE layer call: CTA-resident loop over (routing -> expert tiles gemm1 -> silu-mul -> gemm2 -> weighted finalize + shared add), fp8 block dequant in-tile, TMA/LDG.128 weight streaming, no intermediate global round-trips; fall back to stock chain for T>6 or non-bypassed formats"
expected_e2e = "-0.6 to -1.2 ms/iter if >=1.35x on the chain (biggest single pool on the board)"
