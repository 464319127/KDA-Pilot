kernel_family = "persistent fused MoE: routing -> gemm1 -> SiLU -> gemm2 -> finalize(+shared add)"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 381.42: per MoE layer (75 verify calls/iter T=6) the chain routing(4.7-6.6us) + gemm1(23us) + act(4.2us) + gemm2(16us) + finalize-fused(6.8us) ~= 55-60us across 5-7 launches; pool = MoE GEMM 2.87 ms/iter (trtllm-gen cubin) + aux 1.75 ms/iter, ON the critical path"
entry_points = [
  "replace: flashinfer trtllm_fp8_block_scale_moe cubin chain (bypassed path)",
  "sources to reuse: flashinfer RoutingKernel.cuh (JIT source), sglang jit_kernel/moe_finalize_fuse_shared, CUTLASS SM100 blockwise fp8 GEMM (see LEARNINGS: beats DeepGEMM 1.128x at M<=6, loses only to cuBLAS bf16 which does not apply to MoE fp8)",
]
