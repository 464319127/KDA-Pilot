[task]
slug = "megatasks/02 (norm_rope_pack_jit_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103)"
target_host = "glm52-bs1-opt"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega02"
family = "elementwise_fusion"
kernel_family = "rmsnorm + rope_quantize horizontal/vertical fusion"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 376.06: flashinfer RMSNormKernel 169/iter x 2.2us = 0.372ms + RopeQuantizeKernel 81.6/iter x 2.8us = 0.227ms; all latency-bound (payloads KB-scale)"
entry_points = [
  "flashinfer/data/csrc/norm.cu (RMSNormKernel, JIT source)",
  "flashinfer/data/csrc/rope.cu (RopeQuantizeKernel, JIT source)",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: bs1_norm_rope_pack)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "RMSNorm 2.2us/call ([6,2048]+[6,512] q_a/kv_a per layer), RopeQuantize 2.8us/call; each call is launch-latency dominated"
key_insight = "q_a_layernorm and kv_a_layernorm are ADJACENT on the same [T, 2624] fused_qkv_a output slice -> horizontal fuse into one kernel; rope+quant follows immediately -> vertical fuse candidate"

[benchmark]
mode = "single-GPU CUDA graph 200-round replay wall/round; cold-L2 not critical (activations KB-scale) but weight tensors rotate 48 copies anyway"
gate_port = "P0: jit ports bit-exact vs flashinfer originals AND perf within +-3% AND e2e sanity >= 376 with flag ON"
gate_opt = "P1: fused pack >= 1.4x vs sum of originals on frozen shapes AND per-site outputs bit-exact; e2e sanity >= 378"
device = "1 GPU for kernel dev; 8-GPU serving for e2e"

[deliverable]
route = "P0 port norm.cu RMSNormKernel + rope.cu RopeQuantizeKernel verbatim into jit_kernel; P1 fuse: (a) q_a+kv_a norms one launch, (b) norm->rope->fp8-quant vertical chain for the MLA a-path, constants T/H/eps/dims baked as template params"
expected_e2e = "-0.2 to -0.3 ms/iter"
