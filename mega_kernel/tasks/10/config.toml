[task]
slug = "megatasks/10 (mla_apath_fused_chain_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103)"
target_host = "glm52-bs1-opt (rx devbox pool)"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega10"
family = "gemm_epilogue_fusion"
kernel_family = "bf16 small-M GEMM with fused MLA a-path epilogue (dual RMSNorm + RoPE + fp8 quant + KV write)"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 381.42: per layer the a-path = fused_qkv_a GEMM [T,6144]x[6144,2624] (nvjet ~8-9us, weights 32MB replicated) then q_a_norm[2048]+kv_a_norm[512] (2 x 2.2us) + RopeQuantize (2.8us) + set_kv_buffer; ~78+ chains/iter on the serialized stream; pool ~0.9-1.1 ms/iter"
entry_points = [
  "baseline chain: cuBLAS nvjet GEMM + flashinfer RMSNorm/RopeQuantize + sglang set_mla_kv_buffer",
  "reuse: B200-promoted M=1 bf16/fp8 GEMV kernels (1.356x, KDA prior campaign), flashinfer norm.cu/rope.cu JIT source",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: bs1_mla_apath)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "nvjet bf16 at ~3.7 TB/s effective (the ONLY part at the BW ceiling) + 4-5 small latency-bound kernels behind it"
warning = "the GEMM itself is at the ceiling (LEARNINGS: nothing beats nvjet on bare small-M bf16). The WIN is the epilogue: absorbing norms/rope/quant/KV-write into the GEMM tail removes 4-5 launches x 78 layers from the critical path. If the fused GEMM loses >5% BW, the task fails - epilogue must be free."

[benchmark]
mode = "single-GPU CUDA-graph replay, cold-L2 (48 weight copies, 32MB each)"
gate = "fused chain (T=6): >= 1.3x vs the 5-kernel baseline chain AND GEMM section >= 95% of nvjet standalone BW; bf16 GEMM part bit-comparable is NOT required (fp32 accum reduction order) -> fp32 oracle rel <= 1e-3 for GEMM, exact-match for norm/rope/quant stages vs their standalone kernels on the same GEMM output; e2e sanity >= 383"
device = "1 GPU dev; 8-GPU serving e2e"

[deliverable]
route = "start from the B200-promoted M<=6 GEMV/GEMM kernel (modify-in-place), add fused epilogue stages writing q_a_norm/kv_a_norm outputs + rope'd k_pe + fp8 KV-cache entry directly; per-stage bit checks against the standalone kernels; env-gated dispatch in the MLA attention forward"
expected_e2e = "-0.25 to -0.45 ms/iter"
