[task]
slug = "megatasks/03 (moe_routing_topk_jit_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103)"
target_host = "glm52-bs1-opt"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega03"
family = "moe_aux"
kernel_family = "sigmoid noaux-tc routing top-8/256 + small-batch topk"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 376.06: routingIndicesDynBlockKernel 74.7/iter x 6.6us = 0.491ms + topk_small_batch 22.6/iter x 6.8us = 0.154ms; T=6 x 256 experts is a TINY problem taking 6.6us -> latency/machinery bound"
entry_points = [
  "flashinfer/data/include/flashinfer/trtllm/fused_moe/RoutingKernel.cuh + RoutingDevKernel.h (JIT source)",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: bs1_moe_routing)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "routing 6.6us/call at [6,256] sigmoid top-8 (n_group=1 -> no group stage), launched inside flashinfer trtllm_fp8_block_scale_moe bypassed path"
integration_risk = "our fp8 defer-finalize gate currently requires format_is_bypassed; using our routing means switching to the routed wrapper (PackTopkIds + trtllm_fp8_block_scale_routed_moe) -> must extend defer gate to routed format AND verify do_finalize=False works there; if not achievable bit-safely, deliver kernel + park integration"

[benchmark]
mode = "single-GPU CUDA graph 200-round replay wall/round on frozen [T,256] shapes"
gate_port = "P0: jit routing outputs (topk ids + weights, post scale/norm) bit-exact vs flashinfer routing on random + real logits AND perf >= parity"
gate_opt = "P1: [6,256] top-8 <= 3.5us (>=1.8x); [1,256] not regressed; e2e sanity >= 376 with integration flag ON and identical outputs"
device = "1 GPU for kernel dev; 8-GPU serving for e2e"

[deliverable]
route = "P0 port routing math (sigmoid + bias-corrected top-8, norm_topk_prob=True, routed_scaling_factor=2.5) to a bs=1-shaped jit kernel; P1 single-CTA specialization for T<=6,E=256,K=8; P2 integration via routed wrapper + defer-gate extension, env-gated default-off"
expected_e2e = "-0.15 to -0.25 ms/iter"
