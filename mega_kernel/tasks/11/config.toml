[task]
slug = "megatasks/11 (draft_step_megakernel_bs1)"
arch = "b300"
target_gpu = "8x NVIDIA B300 SXM6 AC (sm_103)"
target_host = "glm52-bs1-opt (rx devbox pool)"
remote_container = "none"
remote_workdir = "/scratch/kda_bs1/mega11"
family = "layer_megakernel"
kernel_family = "TileRT-style whole-layer persistent kernel: MTP draft layer forward at M=1"
model = "zai-org/GLM-5.2-FP8"
model_slug = "glm_52"
serving_context = "bs=1 MTP @ 381.42: the draft graph runs 5 sequential M=1 forwards of the 1-layer MTP head (eh_proj + norms + MLA attn + MoE + ARs), ~200+ kernel launches per step, draft graph wall ~1.2 ms/iter; at M=1 every kernel is launch/latency-bound - the canonical megakernel target"
entry_points = [
  "baseline: the draft CUDA graph (per-step kernel chain)",
  "reuse: task 09/10 building blocks (MoE megakernel, a-path fused chain), task 01 jit AR, B200 M=1 GEMV kernels, TileRT piped_prefetch design notes",
]
port_target = "sglang python/sglang/jit_kernel/ (new module: bs1_draft_megastep)"
shapes_doc = "SHAPES.md"
results = "RESULTS_SM103.md"

[baseline]
serving = "draft graph replay ~1.2 ms/iter for 5 steps (~240us/step incl. inter-kernel gaps at M=1)"
prior_art = "TileRT runs whole DSv3.2 decode as 278 piped_prefetch kernels, occupancy=1, 168 regs (TileRT_讨论材料); MiniTileRT scaffold M0/M1 verified on B200 - ask owner for the scaffold"

[benchmark]
mode = "single-GPU: capture the real draft graph as baseline; candidate = one persistent kernel per step (or per 5-step run if seed dependency allows device-side loop)"
gate = "per-step <= 150us (>=1.5x vs ~240us) at M=1 with fp32-oracle rel <= 2e-2 vs the eager layer forward; 5-step chain semantics identical (sequential token dependency preserved); e2e sanity >= 383 + accept >= 3.80 (accept is THE canary: any numeric drift in the draft shows up here first)"
device = "1 GPU dev; 8-GPU serving e2e (draft runs under TP8 - the megakernel must handle its 2 in-layer ARs, reuse task-01 jit AR device functions)"

[deliverable]
route = "phase the layer into resident stages (a-path GEMV chain -> indexer+sparse attn T=1 -> o_proj -> MoE(32 local experts, top-8) -> ARs inlined as device-side multimem ops); M=1 keeps all activations in registers/smem; weights stream via piped prefetch; start per-stage (3-4 kernels) then merge"
expected_e2e = "-0.3 to -0.5 ms/iter, plus the blueprint for verify-graph megakernelization (the endgame)"
