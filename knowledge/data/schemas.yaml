## Page-Type Schemas
## Defines required and optional fields per page type.
## Consumed by scripts/validate.py

source-pr:
  required:
    - id
    - repo
    - pr
    - title
    - author
    - date
    - url
    - source_category
    - architectures
    - tags
    - techniques
    - hardware_features
    - kernel_types
    - languages
    - captured_at
    - status
  optional:
    - merge_sha
    - description
    - inclusion_reason
    - changed_paths
    - artifact_dir
  disallow_peer_of_artifact_dir:
    - diff_path
    - code_path
    - patch_path
    - key_file_path
  constraints:
    source_category: upstream-code
    status: [open, merged, closed]
    merge_sha_required_when: "status == merged"

## Phase 3: ORIGIN.yaml schema for evidence bundles under evidence/
## Every PR evidence bundle root (evidence/pull-bundles/<repo>/gh-<N>/)
## has exactly one ORIGIN.yaml at its root.
artifact-bundle-provenance:
  required:
    - origin_url
    - upstream_repo
    - license
    - retrieved_at
    - asset_mode
    - files
  optional:
    - upstream_sha
    - derived_from
    - size_cap_truncated
    - license_notice
  constraints:
    asset_mode: [verbatim, extracted, derived]
    derived_from_required_when: "asset_mode == derived"
    upstream_sha_required_when: "asset_mode == verbatim"
  files_schema:
    required:
      - local_path
      - role
      - mode
      - sha256
    optional:
      - upstream_path
      - heading_path
      - size_cap_truncated
    constraints:
      role: [pr-diff, upstream-file, extracted-block, derived-source, approach-notes, bench-record]
      mode: [verbatim, extracted, derived, upstream-patch]
      upstream_path_required_when: "mode in [verbatim, extracted] and upstream_sha present"
      heading_path_required_when: "mode == extracted"

## Phase 4: data/pr-page-skipped.yaml audit (per AC-4). Generated by
## scripts/generate-pr-pages.py for every ledger row whose `decision: include`
## did not produce a sources/prs/<repo>/PR-<N>.md page.
##
## Stage values (matches plan-phase4.md::AC-4 strictly):
##   pre-fetch          -> gh PR fetch returned no data
##   is-kernel-related  -> file-allowlist check excluded the PR
##
## A historical `bootstrap-uncaptured` stage was used in Round 4 R4-8 as a
## transient closure for the FlashInfer Jan->Apr coverage gap. Round 5 R5-2
## reclassified FlashInfer + cutlass + pytorch entries; Round 6 R6-1
## drained the remaining sglang + vllm entries. The vocabulary is now back
## to the plan-text taxonomy.
pr-page-skipped-audit:
  required:
    - rows
  row_schema:
    required:
      - pr_id
      - repo
      - pr_number
      - stage
      - reason
      - recorded_at
    constraints:
      stage: [pre-fetch, is-kernel-related]
  constraints:
    sort_order: "rows sorted by (repo, pr_number) ascending; byte-stable across re-runs"

## data/refresh-cutoff.yaml. Refresh window record maintained by
## scripts/expand-pr-corpus.py.
refresh-cutoff:
  required:
    - start_date
    - cutoff_date
    - updated_at
    - policy
    - repo_ids
  optional:
    - notes

## data/refresh-search-results.yaml. Per-repo GitHub search results from
## scripts/expand-pr-corpus.py --live-search.
refresh-search-results:
  required:
    - schema_version
    - start_date
    - cutoff_date
    - generated_at
    - repos
  repo_schema:
    required:
      - repo_slug
      - searched_at
      - scan_start_date
      - pr_numbers_seen
      - last_pr_date_seen
    constraints:
      pr_numbers_seen_sort: "ascending integers"
