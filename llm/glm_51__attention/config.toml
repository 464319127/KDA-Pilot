[task]
slug = "glm_51__attention"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "attention"
kernel_family = "attention"
model = "zai-org/GLM-5.1-FP8"
model_slug = "glm_51"
entry_points = [
  "flashinfer.decode.trtllm_batch_decode_with_kv_cache_mla",
  "flashinfer.prefill.trtllm_ragged_attention_deepseek",
  "sglang.srt.layers.attention.dsa_backend.DeepseekSparseAttnBackend._forward_standard_mha",
  "sglang.srt.layers.attention.dsa_backend.DeepseekSparseAttnBackend._forward_trtllm",
  "sglang.srt.layers.attention.dsa_backend.DeepseekSparseAttnBackend.forward_decode",
  "sglang.srt.layers.attention.dsa_backend.DeepseekSparseAttnBackend.forward_extend",
]
evidence_json = "docs/profile_evidence.json"
shape_source_json = "docs/captured_kernel_api_shapes.json"
workloads_json = "bench/workloads.json"

[selection]
method = "serving-profile GPU-time headroom (extract_kernel_shapes >2%, family-grouped; provenance only)"
max_pct_of_gpu = 3.82
best_scenario = "sharegpt_mid"
dataset = "sharegpt"
concurrency = "32"

[build]
language = "python/cuda"
baseline_entry_point = "baseline/<copied_sglang_interface>::baseline"
candidate_entry_point = "solution/<candidate_interface>::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
