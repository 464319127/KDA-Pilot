[task]
slug = "glm_47__fp8_bmm"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "quant_gemm"
kernel_family = "fp8_bmm"
model = "nvidia/GLM-4.7-NVFP4"
model_slug = "glm_47"
