[task]
slug = "gemma4__sglang_inplace_fused_experts"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "moe"
kernel_family = "fused_moe_triton"
model = "google/gemma-4-26B-A4B-it"
model_slug = "gemma4"
entry_points = [
  "sglang.srt.layers.moe.moe_runner.triton_utils.fused_moe._fused_moe_kernel_sequence",
  "sglang.srt.layers.moe.moe_runner.triton_utils.fused_moe.fused_experts_impl",
  "sglang.srt.layers.moe.moe_runner.triton_utils.fused_moe.inplace_fused_experts",
  "sglang.srt.layers.moe.moe_runner.triton_utils.fused_moe_triton_kernels.invoke_fused_moe_kernel",
]
evidence_json = "docs/profile_evidence.json"
shape_source_json = "docs/captured_kernel_api_shapes.json"
workloads_json = "bench/workloads.json"

[selection]
method = "serving-profile GPU-time headroom (extract_kernel_shapes >2%, family-grouped; provenance only)"
max_pct_of_gpu = 50.81
best_scenario = "random_high"
dataset = "random"
concurrency = "100"

[build]
language = "python/cuda"
baseline_entry_point = "baseline/<copied_sglang_interface>::baseline"
candidate_entry_point = "solution/<candidate_interface>::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
