note = "In-place speculative-decoding tree-metadata kernel in the fixed captured regime (topk=1, depth=1, draft_token_num=2, FULL_MASK; parent_list [bs,0], selected_index==0). The candidate is a correct, ABI-matched, shape-specialized native-CUDA attempt with a route-proven baseline fallback, but shows NO statistically-clear GPU-time win (production p10/p90 bands overlap baseline). It is launch/marshalling-bound: both sides pay one TVM-FFI call + one CUDA launch and the kernel body is <1us, so no kernel-body design can move the headline under the strict op ABI. The only material lever is wrapper/prefill fusion (the Python-side tree_mask.fill_(True) + retrieve=full(-1) prefill is ~64% of the realistic per-call path, measured), but it changes the measured op boundary and is out of strict-op-ABI scope (DEC-1). Evidence-backed no-go: the recovered upstream baseline is retained. Detail in docs/results.md, docs/run_log.md, docs/dispatch.md."
