[task]
slug = "ernie45__sglang_unified_attention_with_output"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "attention"
kernel_family = "attention"
model = "baidu/ERNIE-4.5-21B-A3B-PT"
model_slug = "ernie45"
entry_points = [
  "flashinfer.decode.trtllm_batch_decode_with_kv_cache",
  "flashinfer.prefill.trtllm_batch_context_with_kv_cache",
  "sglang.srt.layers.attention.trtllm_mha_backend.TRTLLMHAAttnBackend.forward_decode",
  "sglang.srt.layers.attention.trtllm_mha_backend.TRTLLMHAAttnBackend.forward_extend",
]
evidence_json = "docs/profile_evidence.json"
shape_source_json = "docs/captured_kernel_api_shapes.json"
workloads_json = "bench/workloads.json"

[selection]
method = "serving-profile GPU-time headroom (extract_kernel_shapes >2%, family-grouped; provenance only)"
max_pct_of_gpu = 8.02
best_scenario = "random_high"
dataset = "random"
concurrency = "100"

[build]
language = "python/cuda"
baseline_entry_point = "baseline/<copied_sglang_interface>::baseline"
candidate_entry_point = "solution/<candidate_interface>::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
