[task]
slug = "nemotron3_nano__sglang_flashinfer_bmm_fp8"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "gemm"
model = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"
model_slug = "nemotron3_nano"
entry_points = [
  "flashinfer.gemm.bmm_fp8",
  "sglang.srt.layers.quantization.fp8_utils.flashinfer_bmm_fp8",
]
evidence_json = "docs/profile_evidence.json"
shape_source_json = "docs/captured_kernel_api_shapes.json"
workloads_json = "bench/workloads.json"

[selection]
method = "cookbook-aligned torch-profiler e2e share (extract_kernel_shapes >2%)"
max_pct_of_gpu = 20.68
best_scenario = "random_mid"
dataset = "random"
concurrency = "32"

[build]
language = "python/cuda"
baseline_entry_point = "baseline/<copied_sglang_interface>::baseline"
candidate_entry_point = "solution/<candidate_interface>::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
