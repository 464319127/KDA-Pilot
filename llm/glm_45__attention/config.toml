[task]
slug = "glm_45__attention"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "gemm"
kernel_family = "attention"
model = "zai-org/GLM-4.5-FP8"
model_slug = "glm_45"
entry_points = [
  "sglang.srt.layers.attention.flashattention_backend.FlashAttentionBackend.forward_decode",
  "sglang.srt.layers.attention.flashattention_backend.FlashAttentionBackend.forward_extend",
  "sglang.srt.layers.attention.flashattention_backend.flash_attn_with_kvcache",
]
evidence_json = "docs/profile_evidence.json"
shape_source_json = "docs/captured_kernel_api_shapes.json"
workloads_json = "bench/workloads.json"

[selection]
method = "serving-profile GPU-time headroom (extract_kernel_shapes >2%, family-grouped; provenance only)"
max_pct_of_gpu = 9.12
best_scenario = "sharegpt_low"
dataset = "sharegpt"
concurrency = "1"

[build]
language = "python/cuda"
baseline_entry_point = "baseline/<copied_sglang_interface>::baseline"
candidate_entry_point = "solution/<candidate_interface>::candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
use_isolated_runner = true
required_matched_ratio = 1.0
