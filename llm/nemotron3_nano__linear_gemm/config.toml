[task]
slug = "nemotron3_nano__linear_gemm"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "gemm"
model = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"
model_slug = "nemotron3_nano"
entry_points = [
  "sglang.srt.layers.quantization.fp8_utils.apply_fp8_linear_bmm_flashinfer",
  "torch.nn.functional.linear",
]
evidence_json = "docs/profile_evidence.json"
