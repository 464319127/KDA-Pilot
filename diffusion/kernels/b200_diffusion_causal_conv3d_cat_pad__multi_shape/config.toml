[task]
slug = "b200_diffusion_causal_conv3d_cat_pad__multi_shape"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "causal_conv3d_cat_pad"
entry_points = [
  "sglang.jit_kernel.diffusion.triton.causal_conv3d_pad:fused_causal_conv3d_cat_pad",
]

[build]
language = "cuda"
destination_passing_style = true
# Upstream baseline is Triton/Python; it is exposed through a local
# destination-passing launcher (output passed last) with the same ABI as the
# candidate, mirroring the b200_diffusion_fuse_scale_shift__multi_shape precedent.
# The candidate is CUDA built via tvm-ffi.
baseline_entry_point = "baseline/binding.py::fused_causal_conv3d_cat_pad"
candidate_entry_point = "solution/kernel.cu::causal_conv3d_cat_pad_candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
inner_iterations_min = 1
inner_iterations_max = 1024
target_sample_us = 1000
timeout_seconds = 900
use_isolated_runner = true
required_matched_ratio = 1.0
