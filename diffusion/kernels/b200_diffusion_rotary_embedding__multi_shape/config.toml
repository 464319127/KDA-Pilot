[task]
slug = "b200_diffusion_rotary_embedding__multi_shape"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "rotary_embedding"
entry_points = [
  "sglang.jit_kernel.diffusion.triton.rotary:apply_rotary_embedding",
  "sglang.jit_kernel.diffusion.triton.ltx2_rotary:apply_ltx2_split_rotary_emb",
]

[build]
language = "cuda"
destination_passing_style = true
baseline_entry_point = "baseline/kernel.cu::rotary_embedding_baseline"
candidate_entry_point = "solution/kernel.cu::rotary_embedding_candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
inner_iterations_min = 1
inner_iterations_max = 4096
target_sample_us = 1000
timeout_seconds = 600
use_isolated_runner = true
required_matched_ratio = 1.0
