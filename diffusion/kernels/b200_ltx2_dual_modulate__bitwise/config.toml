[task]
slug = "b200_ltx2_dual_modulate__bitwise"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "ltx2_dual_modulate"
entry_points = [
  "sglang.multimodal_gen.runtime.models.dits.ltx_2:_ltx2_try_fused_rmsnorm_dual_modulate",
  "sglang.multimodal_gen.runtime.models.dits.ltx_2:_ltx2_try_fused_rmsnorm_ca_dual_modulate",
]

[build]
language = "cuda"
destination_passing_style = true
# Both baseline and candidate are full-operation TVM-FFI CUDA entries taking
# (x, params/temb/table, double eps, outputs last). The baseline runs the eager
# semantics via ATen (at::rms_norm + dual affine); the candidate computes the same
# at::rms_norm inside the call path and fuses the dual affine. Validation is shared
# (ltx2_dual_modulate_common.cuh) so both sides reject identically. Built via
# tvm_ffi.cpp.load with identical flags (no --use_fast_math).
baseline_entry_points = [
  "baseline/kernel.cu::ltx2_dual_modulate_baseline",
  "baseline/kernel.cu::ltx2_ca_dual_modulate_from_temb_baseline",
]
candidate_entry_points = [
  "solution/kernel.cu::ltx2_dual_modulate_candidate",
  "solution/kernel.cu::ltx2_ca_dual_modulate_from_temb_candidate",
]

[correctness]
bitwise_required = true
comparison = "torch_equal"
forbid_tolerance = true
baseline = "pytorch_eager"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
# Matches docs/standalone_diffusion_benchmark_template.py / bench/benchmark.py argparse
# defaults so a plain `python bench/benchmark.py` honors this config (the template is the
# source of truth for timing policy; do not fork it).
inner_iterations_min = 1
inner_iterations_max = 4096
target_sample_us = 1000
timeout_seconds = 600
use_isolated_runner = true
required_matched_ratio = 1.0
