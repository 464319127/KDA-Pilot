[task]
slug = "b200_diffusion_residual_gate_add__multi_shape"
arch = "b200"
target_gpu = "NVIDIA B200"
family = "residual_gate_add"
entry_points = [
  "sglang.multimodal_gen.runtime.models.dits.ltx_2:LTX2TransformerBlock.forward",
  "sglang.multimodal_gen.runtime.models.dits.ideogram:Ideogram4TransformerBlock.forward",
  "sglang.multimodal_gen.runtime.models.dits.flux_2",
]

[build]
language = "cuda"
destination_passing_style = true
# The upstream "kernel" is PyTorch-eager elementwise math (residual + update*gate
# and a 4D broadcast add), not a CUDA/Triton kernel. Per the standalone contract
# (and the b200_diffusion_fuse_scale_shift precedent for non-CUDA upstreams), the
# baseline is exposed through local destination-passing Python launchers in
# baseline/binding.py with the same ABI as the candidate (outputs passed last);
# the candidate is the fused CUDA module from solution/kernel.cu. One entry per
# public op. (Reconciled from the generator's singular kernel.cu default to the binding.py baseline.)
baseline_entry_points = [
  "baseline/binding.py::residual_gate_add",
  "baseline/binding.py::broadcast_add_4d",
]
candidate_entry_points = [
  "solution/kernel.cu::residual_gate_add",
  "solution/kernel.cu::broadcast_add_4d",
]

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
inner_iterations_min = 1
inner_iterations_max = 2048
target_sample_us = 1000
timeout_seconds = 900
use_isolated_runner = true
required_matched_ratio = 1.0
