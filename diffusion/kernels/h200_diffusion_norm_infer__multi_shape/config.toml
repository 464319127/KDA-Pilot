[task]
slug = "h200_diffusion_norm_infer__multi_shape"
arch = "h200"
target_gpu = "NVIDIA H200"
family = "norm_infer"
entry_points = [
  "sglang.jit_kernel.diffusion.triton.norm:norm_infer",
  "sglang.jit_kernel.diffusion.triton.rmsnorm_onepass:triton_one_pass_rms_norm",
]

[build]
language = "cuda"
destination_passing_style = true
baseline_entry_point = "baseline/kernel.cu::norm_infer_baseline"
candidate_entry_point = "solution/kernel.cu::norm_infer_candidate"

[benchmark]
warmup_runs = 10
iterations = 200
num_trials = 7
inner_iterations_min = 1
inner_iterations_max = 4096
target_sample_us = 1000
timeout_seconds = 600
use_isolated_runner = true
required_matched_ratio = 1.0
